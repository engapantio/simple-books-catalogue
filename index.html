<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/src/assets/book.svg" />
  <meta name="description" content="Search millions of books and save your favorites." />
  <title>Simple Books Catalogue</title>
  <link rel="stylesheet" href="/src/styles/main.css" />
</head>
<body>

  <header class="header">
    <div class="header-inner wrapper">

      <a class="header-brand" href="." aria-label="The Library — home">
        <div class="header-logo" aria-hidden="true">
          <img src="/src/assets/book.svg" alt="" width="24" height="24" />
        </div>
        <div class="header-brand-text">
          <span class="header-brand-name">The Library</span>
          <span class="header-brand-tagline">Discover your next favorite book</span>
        </div>
      </a>

      <div class="header-actions">
        <button class="fav-mobile-btn" id="favMobileBtn"
                aria-label="Show favorites" aria-expanded="false">
          <span class="fav-mobile-btn-hearts" aria-hidden="true">
            <img class="fav-mobile-btn-img" src="/src/assets/heart.svg" alt=""
                 width="16" height="16" />
            <span class="fav-mobile-btn-heart-filled"></span>
          </span>
          <span class="fav-mobile-btn-badge" id="favBadge">0</span>
        </button>

        <button class="theme-btn" id="themeBtn" aria-label="Switch to dark theme">
          <span class="theme-btn-icon" aria-hidden="true">☀️</span>
        </button>
      </div>

    </div>
  </header>

  <section class="hero" aria-labelledby="heroHeading">
    <div class="wrapper">
      <h1 class="hero-title" id="heroHeading">Discover Your Next Great Read</h1>
      <p class="hero-subtitle">
        <span class="hero-subtitle-lead">Search millions of books, build your personal library, and never lose track of</span><br />
        what to read next.
      </p>

        <aside class="favorites" id="favoritesSidebar" aria-label="Favorites">
          <div class="favorites-panel">
            <div class="favorites-header">
              <span class="favorites-header-mark" id="favHeaderMark" aria-hidden="true"></span>
              <div class="favorites-header-text">
                <h2 class="favorites-title">Favorites</h2>
                <p class="favorites-count" id="favCount">0 books saved</p>
              </div>
            </div>
            <ul class="favorites-list" id="favoritesList"
                aria-label="Favorited books"></ul>
            <p class="favorites-empty" id="favEmpty">
              No favorites yet.<br />Click the heart on any book to save it.
            </p>
          </div>
        </aside>

      <div class="search-bar-group" role="search">
        <div class="search-bar">
          <img class="search-bar-icon" src="/src/assets/search.svg"
               alt="" aria-hidden="true" width="20" height="20" />
          <input
            type="search"
            id="searchInput"
            class="search-bar-input"
            placeholder="Search for books by title or author…"
            aria-label="Search for books"
            autocomplete="off"
          />
        </div>
        <button class="search-bar-btn" id="searchBtn" type="button">Search</button>
      </div>

      <div class="author-filter" id="authorFilter" hidden>
        <label for="authorInput" class="author-filter-label">Filter by author:</label>
        <input
          type="text"
          id="authorInput"
          class="author-filter-input"
          placeholder="e.g. Rowling"
          aria-label="Filter results by author"
          autocomplete="off"
        />
      </div>
    </div>
  </section>

  <main class="main" id="main">
    <div class="wrapper">
      <div class="content-layout">

        <section class="results" id="results"
                 aria-label="Search results"
                 aria-live="polite" aria-atomic="false">
          <div class="state-msg" id="stateMsg" role="status"></div>
          <ul class="books-grid" id="booksGrid"></ul>
        </section>

      </div>
    </div>
  </main>

  <footer class="footer">
    <div class="wrapper footer-inner">
      Powered by
      <a href="https://openlibrary.org" target="_blank"
         rel="noopener noreferrer">Open Library</a>
    </div>
  </footer>

  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
